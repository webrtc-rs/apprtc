syntax = "proto3";

package signaling.v1;

message Request {
  uint64 request_id = 1;

  oneof command {
    Register app = 10;
    Admit admit = 11;
    Remove remove = 12;
    Occupancy occupancy = 13;
    Inject inject = 14;
    StatusRequest status = 15;
  }

  message Register {
    string app_id = 1;
    string token = 2;
  }

  message Admit {
    string room_id = 1;
    string client_id = 2;
    bool is_loopback = 3;
  }

  message Remove {
    string room_id = 1;
    string client_id = 2;
  }

  message Occupancy {
    string room_id = 1;
  }

  message Inject {
    string room_id = 1;
    string client_id = 2;
    string msg = 3;
  }

  message StatusRequest {}
}

message Response {
  uint64 request_id = 1;

  oneof result {
    Ok ok = 2;
    Err err = 3;
  }

  message Ok {
    oneof payload {
      Admitted admitted = 10;
      OccupancyResult occupancy = 11;
      StatusResult status = 12;
    }
  }

  message Err {
    string reason = 1;
  }

  message Admitted {
    bool is_initiator = 1;
    repeated string messages = 2;
  }

  message OccupancyResult {
    uint64 count = 1;
  }

  message StatusResult {
    uint64 rooms = 1;
    uint64 clients = 2;
    uint64 websocket_connections = 3;
    uint64 total_websocket_connections = 4;
    uint64 websocket_errors = 5;
  }
}
