name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Create logs directory
        run: mkdir -p logs

      - name: Build AppWeb, signaling, and tests
        run: cargo build --release --package apprtc --bins --tests

      - name: Start AppWeb before signaling and verify startup recovery
        run: |
          ./target/release/appweb \
            --host-ip 127.0.0.1 --port 8080 --web-root appweb \
            --public-url https://127.0.0.1:8080 \
            --signaling-url wss://127.0.0.1:8081/ws \
            --signaling-insecure-tls --tls \
            --debug --level info > ./logs/appweb.log 2>&1 &
          appweb_pid=$!
          sleep 2
          kill -0 "$appweb_pid"
          ./target/release/signaling \
            --host-ip 127.0.0.1 --port 8081 --tls \
            --debug --level info > ./logs/signaling.log 2>&1 &
          for attempt in {1..30}; do
            if curl --silent --fail --insecure https://127.0.0.1:8080/status >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "AppWeb failed to become ready"
          cat ./logs/signaling.log
          cat ./logs/appweb.log
          exit 1

      - name: Verify AppWeb reconnects after signaling restart
        run: |
          pkill -x signaling || true
          curl --silent --insecure https://127.0.0.1:8080/status >/dev/null || true
          ./target/release/signaling \
            --host-ip 127.0.0.1 --port 8081 --tls \
            --debug --level info >> ./logs/signaling.log 2>&1 &
          for attempt in {1..30}; do
            if curl --silent --fail --insecure https://127.0.0.1:8080/status >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "AppWeb failed to reconnect to signaling"
          cat ./logs/signaling.log
          cat ./logs/appweb.log
          exit 1

      - name: Run tests
        run: cargo test --package apprtc --no-fail-fast --test '*' -- --nocapture

      - name: Stop signaling and AppWeb servers
        if: always()
        run: |
          pkill -x signaling || true
          pkill -x appweb || true

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
